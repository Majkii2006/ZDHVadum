{%extends 'main/base.html'%}



{% block content %}

<style>
    .box-left {
        background-color: #473987;
        padding: 20px;
        border-radius: 10px;
    }

    .box-right {
        background-color: #2c2c54;
        padding: 20px;
        border-radius: 10px;
    }
</style>

 <div class="container-fluid mt-5">
    <div class="row text-center mb-4"> 

        <!-- LEWA KOLUMNA -->
        <div class="col-md-4 box-left"> 
        </div> 

        <!-- ŚRODKOWA KOLUMNA -->
         <div class="col-md-4 box-center"> 
            <h1>Lista konspektów:</h1>
            <div class="text-center">
                <br>
                <a type="button" class="btn btn-primary" href="{% url 'add_outline' %}">
                    Dodaj nowy konspekt
                </a>
            </div> 
        </div> 

        <!-- PRAWA KOLUMNA -->
        <div class="col-md-4 box-right"> 
        
        </div> 
    </div>  

    <div class="table-responsive">
        <br>
        <table class="table table-dark table-striped table-hover align-middle w-100">
            <thead>
                <tr>
                    <th>Nazwa Konspektu:</th>
                    <th>Twórca Konspektu:</th>
                    <th>Dodano:</th>
                    <th>Obsługa:</th>
                </tr>
            </thead>

            <tbody>
                {% for outline in outlines %}
                <tr>
                    <td>{{ outline.filename }}</td>
                    <td>{{ outline.author }}</td>
                    <td>{{ outline.uploaded_at }}</td>
                    <td>
                        <a href="{% url 'download_outline' outline.id %}" class="btn btn-sm btn-warning">Pobierz</a>
                        <a href="{% url 'show_outline' outline.id %}" target="_blank" class="btn btn-sm btn-secondary">Podejrzyj</a>
                        <a href="{% url 'delete_outline' outline.id %}" class="btn btn-sm btn-danger">Usuń</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

{% endblock %}
