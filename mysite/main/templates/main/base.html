<!doctype html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% block title %}Panel Obozowy{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
        }

        .navbar {
            background-color: #1f1f1f !important;
            border-bottom: 1px solid #333;
        }

        .nav-link {
            color: #ddd !important;
        }

        .nav-link:hover {
            color: #fff !important;
            opacity: 0.8;
        }

        .dropdown-menu {
            background-color: #1f1f1f;
            border: 1px solid #333;
        }

        .dropdown-item {
            color: #ddd;
        }

        .dropdown-item:hover {
            background-color: #333;
            color: #fff;
        }

        .content-wrapper {
            padding: 30px;
        }
    </style>
</head>

<body data-bs-theme="dark">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark px-3">
    <a class="navbar-brand" href="{% url 'home' %}">
        🏕️ ZDHVadum
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNavbar">
        <ul class="navbar-nav me-auto">

            <li class="nav-item">
                <a class="nav-link" href="{% url 'person' %}">Osoby</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{% url 'schedule' %}">Harmonogram</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{% url 'docs' %}">Organizacyjne</a>
            </li>

        </ul>

        <!-- <ul class="navbar-nav">
            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="" data-bs-toggle="dropdown">
                    Konto
                </a>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="">Profil</a></li>
                    <li><a class="dropdown-item" href="">Wyloguj</a></li>
                </ul>
            </li>
        </ul> -->
    </div>
</nav>

<!-- CONTENT -->
<div class="content-wrapper">
    {% block content %}
    {% endblock %}
</div>


<script>
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    document.addEventListener("DOMContentLoaded", function () {
        const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]')
        tooltipTriggerList.forEach(el => new bootstrap.Tooltip(el))
    })
</script>


</body>
</html>
